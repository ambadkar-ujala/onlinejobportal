{% extends "home.html" %}

{% block content %}
<style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .login-box label {
         display: flex;
         justify-content: left;
         margin-bottom: 0px;
         }

        .login-box {
            width: 350px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #0056b3;
        }
    </style>
<div  style="color:red;display: flex; justify-content: center;">
        {% if error %}
               <p>• {{error}} •</p>
        {% endif %}

    </div>
<div class="login-box">
<div style="display: flex; justify-content: center;" ><h2>Change Password</h2></div><br>
<div  style="display: flex; justify-content: center;">



<form method="post">
       {% csrf_token %}
      <label >Old Password:</label>
      <input type="text" name="oldp">
      <label >New Password:</label>
      <input type="text" name="newp">
      <label >Confirm New Password:</label>
      <input type="text" name="conp">
      <button type="submit">Change Password</button>
</form>
</div>
</div>

{% endblock content %}
