{% extends "ehome.html" %}

{% block content %}
<style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 10px;
            text-align: center;
        }

<!--        .login-box h2 {-->
<!--            margin-bottom: 20px;-->
<!--        }-->

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #0056b3;
        }
    </style>
<script>
function togglePassword(a,b) {
    var password = document.getElementById(a);
    var eye = document.getElementById(b);

    if (password.type === "password") {
        password.type = "text";
        eye.classList.remove("fa-eye");
        eye.classList.add("fa-eye-slash");
    }
    else {
        password.type = "password";
        eye.classList.remove("fa-eye-slash");
        eye.classList.add("fa-eye");
    }
}
</script>

<div class="login-box">
<div style="display: flex; justify-content: center;" ><h2>Employee Registration
</h2></div><br>
<div  style="display: flex; justify-content: center;">

    <form class="container" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="text" name="firstname" placeholder="Enter your firstname" required>
        <input type="text" name="lastname" placeholder="Enter your lastname" required>
        <input type="email" name="email_id" placeholder="Enter your email_id" required>
        <input type="text" name="company" placeholder="Company name" required>
        <input type="text" name="contact" placeholder="Contact Number" required>
        <input type="file" name="image" required>



        <div class="row" style="margin-left: 10px">
           <label>Gender:</label>
                <div class="col-md-2" >
                    <input type="radio"  name="gender" value="male"> Male
                </div>

                <div class="col-md-2" >
                    <input type="radio"  name="gender" value="female"> Female
                </div>
        </div>


        <input type="text" name="username" placeholder="Username" required>
          <div style="position:relative;">
        <input type="password" id="password1" name="password" placeholder="Password" required>
              <i class="fa-solid fa-eye" id="eye1" onclick="togglePassword('password1','eye1')" style="position:absolute; right:10px; top:50%; transform:translateY(-50%);cursor:pointer;"></i></div>
         <div style="position:relative;">
        <input type="password" id="password2" name="confirmpassword" placeholder="Confirm Password" required>
             <i class="fa-solid fa-eye" id="eye2" onclick="togglePassword('password2','eye2')" style="position:absolute; right:10px; top:50%; transform:translateY(-50%);cursor:pointer;"></i></div>
        <button type="submit">Register</button><br><br>
        <p>Already have account?<a href="/employer/login/">Login</a></p>
    </form>

</div>
</div>
</div>



{% endblock content %}
