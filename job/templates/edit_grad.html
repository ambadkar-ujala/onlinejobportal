{% extends "home.html" %}

{% block content %}
<style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .login-box label {
         display: flex;
         justify-content: left;
         margin-left:50px;
         width:600px;
         }

        .login-box {
            width: 800px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-radius: 10px;

        }

        .login-box h2 {
            margin-bottom: 20px;
        }


         .login-box input[type="date"],
         .login-box input[type="number"],
         .login-box input[type="text"],
         .login-box input[type="email"],
         .login-box input[type="password"]{
            width:600px;
            padding:10px;
            margin-left:50px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            justify-content: center;

        }


        .login-box input[type="checkbox"]{
            margin-left:50px;
            width:600px;
            margin-bottom:20px;
        }


        .login-box select {
            margin-left:50px;
            width:600px;
            padding: 10px;

            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #0056b3;
        }
    </style>

<div class="login-box">
<div style="display: flex; justify-content: center;" ><h2> Education</h2></div><br>
<div  style="display: flex; justify-content: center;">


<form method="POST">

{% csrf_token %}

{% for education in educations %}
{% if education.education_type == "Graduation" %}
<h2> Education</h2>

<label>Highest Education:</label>

<select name="education_type">

    <option value="">Select Education</option>

    <option value="10th"
    {% if education.education_type == "10th" %}selected{% endif %}>
        10th
    </option>

    <option value="12th"
    {% if education.education_type == "12th" %}selected{% endif %}>
        12th
    </option>

    <option value="Graduation"
    {% if education.education_type == "Graduation" %}selected{% endif %}>
        Graduation
    </option>

    <option value="PG"
    {% if education.education_type == "Post Graduation" %}selected{% endif %}>
        Post Graduation
    </option>

</select>
<br><br>

<label>Degree:</label>
<input type="text" name="degree" value="{{education.degree}}">

<label>School / College Name:</label>
<input type="text" name="school_college" value="{{education.school_college}}">

<label>Board / University:</label>
<input type="text" name="board_university" value="{{education.board_university}}">

<label>Specialization:</label>
<input type="text" name="specialization" value="{{education.specialization}}">

<label>Passing Year:</label>
<input type="date" name="passing_year" value="{{education.passing_year|date:'Y-m-d'}}">

<label>Percentage:</label>
<input type="text" name="marks" value="{{education.marks}}">

{% endif %}
{% endfor %}

<button type="submit">Save Education</button>

</form>

</div>
</div>
{% endblock content %}
